name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Check out CLI
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs-cli
          path: tecs-cli

      - name: Check out Tecs
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs
          path: tecs

      - name: Build tecs-cli.love
        env:
          TECS_DIR: ${{ github.workspace }}/tecs
        run: tecs-cli/scripts/build_love.sh

      - name: Type-check and build with option 1
        env:
          TECS_CACHE_DIR: ${{ runner.temp }}/tecs-cache
          TECS_CLI_LOVE: ${{ github.workspace }}/tecs-cli/dist/tecs-cli.love
        run: |
          env -u TECS_DIR tecs-cli/launcher/tecs check
          env -u TECS_DIR tecs-cli/launcher/tecs build
          test -f build/main.lua
          test -f build/tecs2d/init.lua

  windows:
    name: windows-latest
    runs-on: windows-latest

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Check out CLI
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs-cli
          path: tecs-cli

      - name: Check out Tecs
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs
          path: tecs

      - name: Build tecs-cli.love
        shell: bash
        env:
          TECS_DIR: ${{ github.workspace }}/tecs
        run: tecs-cli/scripts/build_love.sh

      - name: Type-check and build with option 1
        shell: pwsh
        env:
          TECS_CACHE_DIR: ${{ runner.temp }}\tecs-cache
          TECS_CLI_LOVE: ${{ github.workspace }}\tecs-cli\dist\tecs-cli.love
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          Remove-Item Env:TECS_DIR -ErrorAction SilentlyContinue
          & tecs-cli/launcher/tecs.ps1 check
          & tecs-cli/launcher/tecs.ps1 build
          if (-not (Test-Path "build\main.lua")) { throw "main.lua was not built" }
          if (-not (Test-Path "build\tecs2d\init.lua")) { throw "tecs2d was not built" }
