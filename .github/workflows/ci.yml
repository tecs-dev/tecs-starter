name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Install published Tecs CLI
        env:
          TECS_BIN_DIR: ${{ runner.temp }}/tecs-bin
        run: |
          curl -fsSL https://github.com/tecs-dev/tecs-cli/releases/latest/download/install.sh -o install-tecs.sh
          bash install-tecs.sh

      - name: Type-check and build
        env:
          TECS_CACHE_DIR: ${{ runner.temp }}/tecs-cache
        run: |
          tecs="$RUNNER_TEMP/tecs-bin/tecs"
          "$tecs" info
          "$tecs" check
          "$tecs" build
          test -f build/main.lua
          test -f build/tecs2d/init.lua

  windows:
    name: windows-latest
    runs-on: windows-latest

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Install published Tecs CLI
        shell: pwsh
        env:
          TECS_BIN_DIR: ${{ runner.temp }}\tecs-bin
        run: |
          Invoke-WebRequest https://github.com/tecs-dev/tecs-cli/releases/latest/download/install.ps1 -OutFile install-tecs.ps1
          & .\install-tecs.ps1

      - name: Type-check and build
        shell: pwsh
        env:
          TECS_CACHE_DIR: ${{ runner.temp }}\tecs-cache
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          $tecs = Join-Path $env:RUNNER_TEMP "tecs-bin\tecs.ps1"
          & $tecs info
          & $tecs check
          & $tecs build
          if (-not (Test-Path "build\main.lua")) { throw "main.lua was not built" }
          if (-not (Test-Path "build\tecs2d\init.lua")) { throw "tecs2d was not built" }
