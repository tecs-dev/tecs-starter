name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      # Each platform installs through a different published channel so CI
      # exercises the Homebrew tap, the Scoop bucket, and the installer script.
      - name: Install published Tecs CLI (Homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install tecs-dev/tap/tecs-cli
          echo "TECS=$(brew --prefix)/bin/tecs" >> "$GITHUB_ENV"

      - name: Install published Tecs CLI (installer script)
        if: runner.os == 'Linux'
        env:
          TECS_BIN_DIR: ${{ runner.temp }}/tecs-bin
        run: |
          curl -fsSL https://github.com/tecs-dev/tecs-cli/releases/latest/download/install.sh -o install-tecs.sh
          bash install-tecs.sh
          echo "TECS=$TECS_BIN_DIR/tecs" >> "$GITHUB_ENV"

      - name: Type-check and build
        env:
          TECS_CACHE_DIR: ${{ runner.temp }}/tecs-cache
        run: |
          "$TECS" info
          "$TECS" check
          "$TECS" build
          test -f build/main.lua
          test -f build/tecs2d/init.lua

  windows:
    name: windows-latest
    runs-on: windows-latest

    steps:
      - name: Check out starter
        uses: actions/checkout@v4

      - name: Install published Tecs CLI (Scoop)
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          Invoke-WebRequest get.scoop.sh -OutFile install-scoop.ps1
          .\install-scoop.ps1 -RunAsAdmin
          $shims = Join-Path $env:USERPROFILE "scoop\shims"
          $scoop = Join-Path $shims "scoop.ps1"
          & $scoop bucket add tecs https://github.com/tecs-dev/scoop-bucket
          & $scoop install tecs
          $tecs = Join-Path $shims "tecs.cmd"
          if (-not (Test-Path $tecs)) {
            Get-ChildItem $shims
            throw "scoop did not create the tecs shim"
          }
          "TECS=$tecs" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Type-check and build
        shell: pwsh
        env:
          TECS_CACHE_DIR: ${{ runner.temp }}\tecs-cache
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          & $env:TECS info
          & $env:TECS check
          & $env:TECS build
          if (-not (Test-Path "build\main.lua")) { throw "main.lua was not built" }
          if (-not (Test-Path "build\tecs2d\init.lua")) { throw "tecs2d was not built" }
