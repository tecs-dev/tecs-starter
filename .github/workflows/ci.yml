name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  # Keep this in sync with the Tecs repo CI. Newer tl snapshots currently
  # reject a LuaJIT 5.1 loop idiom used by Tecs' rockspec build.
  TL_REF: 4b97e8d4c743795cb148c898fb19e14b6f3b8f2d

jobs:
  check-build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    env:
      TECS_DIR: ${{ github.workspace }}/tecs

    steps:
      - name: Check out starter
        uses: actions/checkout@v4
        with:
          path: tecs-starter

      - name: Check out Tecs
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs
          path: tecs

      - name: Set up LuaJIT
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "luajit"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4
        with:
          luarocksVersion: "3.12.2"

      - name: Install Teal
        run: |
          git clone https://github.com/teal-language/tl.git /tmp/tl-dev
          cd /tmp/tl-dev && git checkout "$TL_REF"
          luarocks make tl-dev-1.rockspec

      - name: Type-check
        working-directory: tecs-starter
        run: luajit tecs check

      - name: Build
        working-directory: tecs-starter
        run: luajit tecs build

  check-build-windows:
    name: windows-latest
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    env:
      TECS_DIR: ${{ github.workspace }}/tecs

    steps:
      - name: Check out starter
        uses: actions/checkout@v4
        with:
          path: tecs-starter

      - name: Check out Tecs
        uses: actions/checkout@v4
        with:
          repository: tecs-dev/tecs
          path: tecs

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            curl
            unzip
            zip
            tar
            rsync
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-7zip
            mingw-w64-x86_64-luajit

      - name: Install LuaRocks
        run: |
          ver=3.12.2
          curl -L -o luarocks.tar.gz "https://luarocks.org/releases/luarocks-${ver}.tar.gz"
          tar xzf luarocks.tar.gz
          cd "luarocks-${ver}"
          ./configure --prefix=/mingw64 --lua-version=5.1 \
            --with-lua-interpreter=luajit \
            --with-lua=/mingw64 \
            --with-lua-include=/mingw64/include/luajit-2.1
          make
          make install

      - name: Configure LuaRocks
        run: |
          mkdir -p "$HOME/bin"
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'a=()' \
            'for x in "$@"; do' \
            '  x="${x//\\//}"' \
            '  if [[ "$x" == */\*.\* ]]; then x="${x%/*.*}/."; fi' \
            '  a+=("$x")' \
            'done' \
            'exec /usr/bin/cp "${a[@]}"' > "$HOME/bin/cp-luarocks"
          chmod +x "$HOME/bin/cp-luarocks"
          luarocks config --scope user variables.SEVENZ /mingw64/bin/7z
          luarocks config --scope user variables.CP "$(cygpath -m /usr/bin/bash.exe) $(cygpath -m "$HOME/bin/cp-luarocks")"

      - name: Install Teal
        run: |
          export PATH="$HOME/bin:$HOME/.luarocks/bin:$PATH"
          git clone https://github.com/teal-language/tl.git /tmp/tl-dev
          cd /tmp/tl-dev && git checkout "$TL_REF"
          luarocks make tl-dev-1.rockspec
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'bat="$HOME/.luarocks/bin/tl.bat"' \
            'exec cmd //C call "$(cygpath -w "$bat")" "$@"' > "$HOME/bin/tl"
          chmod +x "$HOME/bin/tl"

      - name: Type-check
        working-directory: tecs-starter
        run: |
          export PATH="$HOME/bin:$HOME/.luarocks/bin:$PATH"
          luajit tecs check

      - name: Build
        working-directory: tecs-starter
        run: |
          export PATH="$HOME/bin:$HOME/.luarocks/bin:$PATH"
          luajit tecs build
